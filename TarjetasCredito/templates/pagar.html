<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Realizar pago</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('inicio') }}">
        <img src="{{ url_for('static', filename='home.png') }}" width="30" class="me-2">
        Tarjetas
    </a>

    <div class="navbar-nav">
      <a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a>
      <a class="nav-link" href="{{ url_for('crear') }}">Crear tarjeta</a>
      <a class="nav-link" href="{{ url_for('gastos') }}">Gastos</a>
    </div>
  </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4">Realizar pago</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card p-4">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Concepto</label>
                <input type="text" name="concepto" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cantidad (€)</label>
                <input type="number" step="0.01" name="cantidad" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success">
                Pagar
            </button>

            <a href="{{ url_for('ver_tarjeta', nif=nif) }}" class="btn btn-secondary ms-2">
                Volver
            </a>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
