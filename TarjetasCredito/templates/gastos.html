<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gastos Totales</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('inicio') }}">
        <img src="{{ url_for('static', filename='home.png') }}" width="30" class="me-2">
        Tarjetas
    </a>

    <div class="navbar-nav">
      <a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a>
      <a class="nav-link" href="{{ url_for('crear') }}">Crear tarjeta</a>
      <a class="nav-link" href="{{ url_for('gastos') }}">Gastos</a>
    </div>
  </div>
</nav>

<div class="container mt-5 text-center">

    <h1 class="mb-4">Gastos Totales</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card p-4">

        <p class="fs-4">
            <strong>Total acumulado:</strong>
        </p>

        <p class="display-6 text-success">
            {{ total }} €
        </p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
