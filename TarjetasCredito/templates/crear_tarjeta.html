<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Tarjeta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('inicio') }}">
        <img src="{{ url_for('static', filename='home.png') }}" width="30" class="me-2">
        Tarjetas
    </a>

    <div class="navbar-nav">
      <a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a>
      <a class="nav-link" href="{{ url_for('crear') }}">Crear tarjeta</a>
      <a class="nav-link" href="{{ url_for('gastos') }}">Gastos</a>
    </div>
  </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4">Crear Nueva Tarjeta</h1>

    {% with mensajes = get_flashed_messages(with_categories=true) %}
      {% if mensajes %}
        {% for categoria, mensaje in mensajes %}
          <div class="alert alert-{{ categoria }} alert-dismissible fade show">
            {{ mensaje }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="card p-4">

        <div class="mb-3">
            <label class="form-label">Titular</label>
            <input type="text" name="titular" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">NIF</label>
            <input type="text" name="nif" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">PIN</label>
            <input type="text" name="pin" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Límite</label>
            <input type="number" step="0.01" name="limite" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Número de tarjeta</label>
            <input type="text" name="numero" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Crear tarjeta</button>
        <hr>
        <a href="{{ url_for('inicio') }}" class="btn btn-secondary ms-2">Volver</a>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
